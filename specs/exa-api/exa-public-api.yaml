                          - type: string
                          - type: 'null'
                        description: Company name.
                      foundedYear:
                        anyOf:
                          - type: integer
                          - type: 'null'
                        description: Year the company was founded.
                      description:
                        anyOf:
                          - type: string
                          - type: 'null'
                        description: Short company description.
                      workforce:
                        anyOf:
                          - type: object
                            properties:
                              total:
                                anyOf:
                                  - type: number
                                  - type: 'null'
                                description: Total estimated employee count.
