                            properties:
                              visitsMonthly:
                                anyOf:
                                  - type: number
                                  - type: 'null'
                                description: Estimated monthly website visits.
                              countryRank:
                                anyOf:
                                  - type: integer
                                  - type: 'null'
                                description: >-
                                  Estimated website traffic rank within the
                                  company's primary country.
                              avgDurationSeconds:
                                anyOf:
                                  - type: number
                                  - type: 'null'
                                description: Estimated average visit duration, in seconds.
                              history:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    value:
                                      type: number
                                      description: >-
                                        Estimated monthly visits for this
                                        period.
                                    dateFrom:
                                      type: string
                                      description: >-
                                        Start month for this value, formatted as
                                        YYYY-MM.
                                    dateTo:
                                      type: string
                                      description: >-
                                        End month for this value, formatted as
                                        YYYY-MM.
                                  required:
                                    - value
                                    - dateFrom
                                    - dateTo
                                description: Historical monthly website visits.
                            required:
                              - visitsMonthly
                              - countryRank
                              - avgDurationSeconds
                              - history
                          - type: 'null'
                        description: Company web traffic information.
                    required:
                      - name
                      - foundedYear
                      - description
                      - workforce
                      - headquarters
                      - financials
                      - webTraffic
                    description: Company-specific entity fields.
                required:
                  - id
                  - type
                  - version
                  - properties
              - type: object
                properties:
