  /v0/monitors:
    servers:
      - url: https://api.exa.ai/websets
    post:
      description: >-
        Creates a new `Monitor` to continuously keep your Websets updated with
        fresh data.


        Monitors automatically run on your defined schedule to ensure your
        Websets stay current without manual intervention:


        - **Find new content**: Execute `search` operations to discover fresh
        items matching your criteria

        - **Update existing content**: Run `refresh` operations to update items
        contents and enrichments

        - **Automated scheduling**: Configure `cron` expressions and `timezone`
        for precise scheduling control
      operationId: monitors-create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMonitorParameters'
      responses:
        '201':
          description: Monitor created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Monitor'
          headers:
            X-Request-Id:
              schema:
                type: string
              description: Unique identifier for the request.
              example: req_N6SsgoiaOQOPqsYKKiw5
              required: true
      summary: Create a Monitor
      tags:
        - Monitors
      security:
        - apiKey: []
        - bearer: []
      x-codeSamples:
        - lang: javascript
          label: JavaScript
          source: |-
            // npm install exa-js
            import Exa from "exa-js";
            const exa = new Exa("YOUR_EXA_API_KEY");

            const monitor = await exa.websets.monitors.create({
              websetId: "webset_id",
              cadence: {
                cron: "0 9 * * 1", // Every Monday at 9 AM
                timezone: "America/New_York",
              },
              behavior: {
                type: "search",
                config: {
                  behavior: "append",
                  query: "new companies to monitor",
                  count: 10,
                },
              },
            });

            console.log(`Created monitor: ${monitor.id}`);
        - lang: python
          label: Python
          source: |-
            # pip install exa-py
            from exa_py import Exa

            exa = Exa("YOUR_EXA_API_KEY")

            monitor = exa.websets.monitors.create(
                params={
                    "websetId": "webset_id",
                    "cadence": {
                        "cron": "0 9 * * 1",  # Every Monday at 9 AM
                        "timezone": "America/New_York",
                    },
                    "behavior": {
                        "type": "search",
                        "config": {
                            "behavior": "append",
                            "query": "new companies to monitor",
                            "count": 10,
                        },
                    },
                }
            )

            print(f"Created monitor: {monitor.id}")
