            results:
              type: array
              items:
                $ref: '#/components/schemas/SearchResultOutput'
              description: >-
                A list of search results containing title, URL, published date,
                and author.
            resolvedSearchType:
              description: >-
                Deprecated legacy field. Current production responses may return
