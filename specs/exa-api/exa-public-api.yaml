                                  - type: object
                                    properties:
                                      name:
                                        anyOf:
                                          - type: string
                                          - type: 'null'
                                        description: Funding round name.
                                      date:
                                        anyOf:
                                          - type: string
                                          - type: 'null'
                                        description: Funding round date.
                                      amount:
                                        anyOf:
                                          - type: number
                                          - type: 'null'
                                        description: Funding round amount in USD.
                                    required:
