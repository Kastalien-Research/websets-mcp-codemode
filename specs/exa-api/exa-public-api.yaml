                                      anyOf:
                                        - type: string
                                        - type: 'null'
                                      description: Referenced institution name.
                                  required:
                                    - id
                                    - name
                                - type: 'null'
                              description: Education institution.
                          required:
                            - degree
                            - dates
                            - institution
                        description: Known education history for this person.
                    required:
                      - name
                      - firstName
                      - lastName
                      - location
                      - workHistory
                      - educationHistory
                    description: Person-specific entity fields.
                required:
                  - id
                  - type
                  - version
                  - properties
            type: object
        extras:
          description: Results from extras.
          example:
            links: []
          type: object
          properties:
