  /monitors:
    post:
      operationId: createMonitor
      summary: Create a Monitor
      description: >-
        Creates a new Monitor to run recurring Exa searches on a schedule.


        Monitors automatically execute your search query on a recurring schedule
        and deliver results to your webhook endpoint with automatic
        deduplication:


        - **Date-based filtering** only fetches content since the last run


        - **Semantic deduplication** tracks previous outputs to surface only new
        developments


        The response includes a `webhookSecret` that is only returned once at
        creation time. Store it securely for webhook signature verification.
      tags:
        - Monitors
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSearchMonitorParameters'
      responses:
        '201':
          description: The created monitor with webhook secret
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSearchMonitorResponse'
    get:
      operationId: listMonitors
      summary: List Monitors
      description: >-
        Lists all monitors for the authenticated team. Supports filtering by
        status and cursor-based pagination.
      tags:
        - Monitors
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum:
              - active
              - paused
              - disabled
            description: Filter monitors by status
        - in: query
          name: cursor
          schema:
            type: string
            description: Pagination cursor from a previous response
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            description: Number of results per page
            default: 50
        - in: query
          name: name
          schema:
            type: string
            maxLength: 250
            description: Filter monitors by name (case-insensitive substring match)
        - in: query
          name: metadata
          schema:
            description: >-
              Filter monitors by metadata key-value pairs (exact match, AND
              semantics). Use bracket notation: `metadata[key]=value`.
            type: object
            propertyNames:
              type: string
            additionalProperties:
              type: string
          style: deepObject
          explode: true
          description: >-
            Filter monitors by metadata key-value pairs (exact match, AND
            semantics). Use bracket notation: `metadata[key]=value`.
      responses:
        '200':
          description: A paginated list of monitors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListSearchMonitorsResponse'
  /monitors/batch:
    post:
      operationId: batchMonitors
      summary: Batch Action on Monitors
      description: >-
        Perform a batch action on monitors matching the provided filters.


        Supported actions:

        - **delete**: Permanently remove matching monitors

        - **pause**: Pause matching monitors

        - **unpause**: Unpause matching monitors


        Use `dry_run: true` (the default) to preview which monitors would be
        affected before performing the action. Results are paginated via the
        `limit` parameter; loop until `has_more` is `false` to process all
        matching monitors.
      tags:
        - Monitors
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchMonitorsRequest'
      responses:
        '200':
          description: Batch action result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchMonitorsResponse'
  /monitors/{id}:
    get:
      operationId: getMonitor
      summary: Get a Monitor
      description: Retrieves a single monitor by its ID.
      tags:
        - Monitors
      parameters:
        - in: path
          name: id
          schema:
            type: string
            description: The monitor ID
          required: true
          description: The monitor ID
      responses:
        '200':
          description: The monitor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchMonitor'
    patch:
      operationId: updateMonitor
      summary: Update a Monitor
      description: >-
        Updates an existing monitor. All fields are optional. For `search`, you
        can send a partial object containing only the fields you want to change.
        Set `trigger` to `null` to remove the schedule.
