              example: ''
              deprecated: true
              type: string
            context:
              type: string
              description: >-
                Deprecated. Combined context string from search results. Use
                highlights or text instead.
              deprecated: true
            costDollars:
              $ref: '#/components/schemas/CostDollarsOutput'
          required:
            - results
          additionalProperties: false
    ContentsResponse:
      type: object
      properties:
        requestId:
          type: string
          description: Unique identifier for the request.
          example: b5947044c4b78efa9552a7c89b306d95
        results:
          type: array
          items:
            $ref: '#/components/schemas/SearchResultOutput'
        context:
          type: string
          description: >-
            Deprecated. Combined context string from search results. Use
            highlights or text instead.
          deprecated: true
        statuses:
          description: Status information for each requested URL or document ID.
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The URL or document ID that was requested.
                example: https://example.com
              status:
                type: string
                enum:
                  - success
                  - error
                description: Status of the content fetch operation.
                example: success
              source:
                description: Where the returned content was sourced from.
                type: string
                enum:
                  - cached
                  - crawled
              error:
                anyOf:
                  - type: object
                    properties:
                      tag:
                        description: Specific error type.
                        example: CRAWL_NOT_FOUND
                        type: string
                      httpStatusCode:
                        anyOf:
                          - type: integer
                            minimum: 100
                            maximum: 599
                          - type: 'null'
                        description: The corresponding HTTP status code.
                        example: 404
                    additionalProperties: false
                  - type: 'null'
                description: Error details, only present when status is "error".
            required:
              - id
              - status
            additionalProperties: false
        costDollars:
          $ref: '#/components/schemas/CostDollarsOutput'
      additionalProperties: false
    AnswerResponse:
      type: object
      properties:
        requestId:
          type: string
          description: Unique identifier for the request.
          example: b5947044c4b78efa9552a7c89b306d95
        answer:
          description: >-
            The generated answer based on search results. Returns a string by
            default, or a structured object matching the provided outputSchema.
          example: $350 billion.
          oneOf:
            - type: string
            - type: object
              propertyNames:
                type: string
              additionalProperties:
                $ref: '#/components/schemas/JsonValue'
        citations:
          description: Search results used to generate the answer.
          type: array
          items:
            type: object
            properties:
              title:
                type: string
                description: The title of the search result.
                example: >-
                  SpaceX valued at $350bn as company agrees to buy shares from
                  ...
              url:
                type: string
                description: The URL of the search result.
                example: >-
                  https://www.theguardian.com/science/2024/dec/11/spacex-valued-at-350bn-as-company-agrees-to-buy-shares-from-employees
                format: uri
              publishedDate:
                description: >-
                  An estimate of the creation date, from parsing HTML content.
                  Format is YYYY-MM-DD.
                example: 2023-11-16T01:36:32.547Z
                format: date-time
                type: string
              author:
                description: If available, the author of the content.
                example: Humza Naveed
                anyOf:
                  - type: string
                  - type: 'null'
              id:
                description: >-
                  The temporary ID for the document. Useful for the /contents
                  endpoint.
                example: https://arxiv.org/abs/2307.06435
                type: string
              image:
                description: >-
                  The URL of an image associated with the search result, if
                  available.
                example: https://arxiv.org/pdf/2307.06435.pdf/page_1.png
                format: uri
                type: string
              favicon:
                description: The URL of the favicon for the search result's domain.
                example: https://arxiv.org/favicon.ico
                format: uri
                type: string
              text:
                description: >-
                  The full text content of each source. Only present when text
                  contents are requested.
                example: >-
                  SpaceX valued at $350bn as company agrees to buy shares from
                  ...
                type: string
            required:
              - title
              - url
            additionalProperties: false
        costDollars:
          $ref: '#/components/schemas/CostDollarsOutput'
      required:
        - answer
      additionalProperties: false
    CreateSearchMonitorResponse:
