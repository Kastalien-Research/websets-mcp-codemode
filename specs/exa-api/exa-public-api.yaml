            // npm install exa-js

            import Exa from "exa-js";

            const exa = new Exa("YOUR_EXA_API_KEY");


            const importJob = await exa.websets.imports.update("webset_id",
            "import_id", {
              name: "Updated Import Name",
            });


            console.log(`Updated import: ${importJob.id}`);
        - lang: python
          label: Python
          source: |-
            # pip install exa-py
            from exa_py import Exa

            exa = Exa("YOUR_EXA_API_KEY")

            import_job = exa.websets.imports.update(
                "webset_id", "import_id", params={"name": "Updated Import Name"}
            )

            print(f"Updated import: {import_job.id}")
    delete:
      description: Deletes a import.
      operationId: imports-delete
      parameters:
        - name: id
          required: true
          in: path
          description: The id of the Import
          schema:
            type: string
      responses:
        '200':
          description: Import deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Import'
          headers:
            X-Request-Id:
              schema:
                type: string
              description: Unique identifier for the request.
              example: req_N6SsgoiaOQOPqsYKKiw5
              required: true
      summary: Delete Import
      tags:
        - Imports
      security:
        - apiKey: []
        - bearer: []
      x-codeSamples:
        - lang: javascript
          label: JavaScript
          source: |-
            // npm install exa-js
            import Exa from "exa-js";
            const exa = new Exa("YOUR_EXA_API_KEY");

            await exa.websets.imports.delete("webset_id", "import_id");

            console.log("Import deleted successfully");
        - lang: python
          label: Python
          source: |-
            # pip install exa-py
            from exa_py import Exa

            exa = Exa("YOUR_EXA_API_KEY")

            exa.websets.imports.delete("webset_id", "import_id")

            print("Import deleted successfully")
components:
  schemas:
    SearchRequest:
      type: object
      properties:
        includeDomains:
          anyOf:
            - maxItems: 1200
              type: array
              items:
                type: string
              description: >-
                List of domains to include in the search. If specified, results
                will only come from these domains.
              example:
                - arxiv.org
                - paperswithcode.com
            - type: 'null'
        excludeDomains:
          anyOf:
            - maxItems: 1200
              type: array
              items:
                type: string
              description: >-
                List of domains to exclude from search results. If specified, no
                results will be returned from these domains.
            - type: 'null'
        startCrawlDate:
          anyOf:
            - type: string
              description: >-
                Crawl date refers to the date that Exa discovered a link.
                Results will include links that were crawled after this date.
                Must be specified in ISO 8601 format.
              example: 2023-01-01T00:00:00.000Z
              format: date-time
            - type: 'null'
        endCrawlDate:
          anyOf:
            - type: string
              description: >-
                Crawl date refers to the date that Exa discovered a link.
                Results will include links that were crawled before this date.
                Must be specified in ISO 8601 format.
              example: 2023-12-31T00:00:00.000Z
              format: date-time
            - type: 'null'
        startPublishedDate:
          anyOf:
            - type: string
              description: >-
                Only links with a published date after this will be returned.
                Must be specified in ISO 8601 format.
              example: 2023-01-01T00:00:00.000Z
              format: date-time
            - type: 'null'
        endPublishedDate:
          anyOf:
            - type: string
              description: >-
                Only links with a published date before this will be returned.
                Must be specified in ISO 8601 format.
              example: 2023-12-31T00:00:00.000Z
              format: date-time
            - type: 'null'
        numResults:
          anyOf:
            - type: integer
              minimum: 1
              maximum: 100
              description: >-
                Number of results to return. Limits vary by search type. The
                maximum public limit is 100 results. Contact sales
                (hello@exa.ai) to discuss higher limits.
              example: 10
              default: 10
            - type: 'null'
        context:
          anyOf:
            - description: >-
                Deprecated: Use highlights or text instead. Returns page
                contents as a combined context string.
              deprecated: true
              oneOf:
                - type: boolean
                  description: >-
                    Deprecated: Use highlights or text instead. Returns page
                    contents as a combined context string.
                  example: true
                  deprecated: true
                - type: object
                  properties:
                    maxCharacters:
                      type: integer
                      minimum: 1
                      maximum: 10000
                      description: >-
                        Deprecated. Maximum character limit for the context
                        string. Maximum supported value is 10000.
                      example: 10000
                  description: >-
                    Deprecated: Use highlights or text instead. Returns page
                    contents as a combined context string.
                  deprecated: true
            - type: 'null'
        moderation:
          anyOf:
            - type: boolean
              description: >-
                Enable content moderation to filter unsafe content from search
                results.
              example: true
              default: false
            - type: 'null'
        contents:
          anyOf:
            - description: >-
                Content options for text, highlights, summary, extras, and
                freshness controls.
              $ref: '#/components/schemas/ContentsOptions'
            - type: 'null'
        query:
          type: string
          minLength: 1
          description: The query string for the search.
          example: Latest developments in LLM capabilities
        additionalQueries:
          anyOf:
            - minItems: 1
              maxItems: 10
              type: array
              items:
                type: string
              description: >-
                Additional query variations for deep-search variants. Only works
                with a deep-search type. When provided, these queries are used
                alongside the main query for broader results.
              example:
                - LLM advancements
                - large language model progress
            - type: 'null'
        type:
          anyOf:
            - type: string
              enum:
                - instant
                - fast
                - auto
                - deep-lite
                - deep
                - deep-reasoning
              description: >-
                The type of search. auto is the default and intelligently
                selects the best search mode, instant provides the lowest
                latency for real-time applications, fast uses lower-latency
                search models, deep-lite is lightweight synthesis, deep performs
                in-depth research with synthesis, and deep-reasoning adds more
                reasoning.
              example: auto
              default: auto
            - type: 'null'
        category:
          anyOf:
            - type: string
              enum:
                - company
                - research paper
                - news
                - personal site
                - financial report
                - people
              description: >-
                A data category to focus on. Known categories include `company`,
                `research paper`, `news`, `personal site`, `financial report`,
                and `people`. Other strings are accepted and used as category
                hints for search. The `people` and `company` categories have
                improved quality for finding people profiles and company pages.
                Note: The `company` and `people` categories only support a
                limited set of filters. The following parameters are NOT
                supported for these categories: `startPublishedDate`,
                `endPublishedDate`, `startCrawlDate`, `endCrawlDate`,
                `excludeDomains`. For `people` category, `includeDomains` only
                accepts supported profile domains. Using unsupported parameters
                will result in a 400 error.
              example: research paper
            - type: 'null'
        userLocation:
          anyOf:
            - type: string
              description: The two-letter ISO country code of the user, e.g. US.
              example: US
            - type: 'null'
        compliance:
          anyOf:
            - type: string
              enum:
                - hipaa
              description: >-
                Enterprise-only compliance mode. Set to `hipaa` to require
                HIPAA-safe processing. Requests fail closed or restrict features
                when the requested behavior requires non-HIPAA-safe processors.
              example: hipaa
            - type: 'null'
        outputSchema:
          anyOf:
            - oneOf:
                - type: object
                  properties:
                    type:
                      type: string
                      const: text
                    description:
                      type: string
                  required:
                    - type
                - type: object
                  properties:
                    type:
                      type: string
                      const: object
                    description:
                      type: string
                    properties:
                      type: object
                      propertyNames:
                        type: string
                      additionalProperties:
                        $ref: '#/components/schemas/JsonValue'
                    required:
                      type: array
                      items:
                        type: string
                    additionalProperties:
                      type: boolean
                  required:
                    - type
                  additionalProperties:
                    $ref: '#/components/schemas/JsonValue'
              description: >-
                JSON schema for synthesized output. Supported root types are
                "text" and "object". When provided, the response includes an
                output object whose content matches this schema. Works with
                every search type and adds about 2 seconds of synthesis latency
                on top of the selected search type.
              type: object
            - type: 'null'
        systemPrompt:
          anyOf:
            - type: string
              description: >-
                Additional instructions that guide generated output or agent
                behavior. Use this for source preferences, novelty constraints,
                duplication constraints, or other behavior guidance.
              example: Prefer official sources and avoid duplicate results.
            - type: 'null'
        stream:
          anyOf:
            - type: boolean
              description: >-
                Requests server-sent events for synthesized output streaming.
                Streaming is currently used only when outputSchema is provided;
                otherwise the endpoint returns the normal JSON search response.
              default: false
            - type: 'null'
      required:
        - query
    JsonValue:
      description: Any JSON value.
      oneOf:
        - type: 'null'
        - type: boolean
        - type: number
        - type: string
        - type: array
          items:
            $ref: '#/components/schemas/JsonValue'
        - type: object
          propertyNames:
            type: string
          additionalProperties:
            $ref: '#/components/schemas/JsonValue'
    ContentsOptions:
      type: object
      properties:
        text:
          anyOf:
            - description: Text extraction options for each result.
              oneOf:
                - type: boolean
                  title: Simple text retrieval
                  description: >-
                    If true, returns full page text with default settings. If
                    false, disables text return.
                  default: false
                - type: object
                  properties:
                    maxCharacters:
                      anyOf:
                        - type: integer
                          minimum: 1
                          maximum: 10000
                          description: >-
                            Maximum character limit for the full page text.
                            Useful for controlling response size and API costs.
                            Maximum supported value is 10000.
                          example: 1000
                        - type: 'null'
                    includeHtmlTags:
                      anyOf:
                        - type: boolean
                          description: >-
                            If true, include lightweight HTML tags in returned
                            text instead of plain markdown-style text. Use
                            maxAgeHours: 0 when you need this applied to freshly
                            fetched content.
                          example: false
                          default: false
                        - type: 'null'
                    verbosity:
                      anyOf:
                        - type: string
                          enum:
                            - compact
                            - standard
                            - full
                          description: >-
                            Controls text rendering verbosity. compact focuses
                            on main content, standard includes more surrounding
                            page context, and full requests the most complete
                            rendered text. Some pages may produce identical
                            standard and full output. Use maxAgeHours: 0 when
                            you need this applied to freshly fetched content.
                          example: standard
                          default: compact
                        - type: 'null'
                    includeSections:
                      anyOf:
                        - type: array
                          items:
                            type: string
                            enum:
                              - header
                              - navigation
                              - banner
                              - body
                              - sidebar
                              - footer
                              - metadata
                          description: >-
                            Best-effort. Only include content classified into
                            these semantic page sections. Section classification
                            may be unavailable or incomplete for some pages;
                            validate output if strict filtering is required. Use
                            maxAgeHours: 0 when you need this applied to freshly
                            fetched content.
                          example:
                            - body
                            - header
                        - type: 'null'
                    excludeSections:
                      anyOf:
                        - type: array
                          items:
                            type: string
                            enum:
                              - header
                              - navigation
                              - banner
                              - body
                              - sidebar
                              - footer
                              - metadata
                          description: >-
                            Exclude content classified into these semantic page
                            sections. Section classification is best-effort. Use
                            maxAgeHours: 0 when you need this applied to freshly
                            fetched content.
                          example:
                            - navigation
                            - footer
                            - sidebar
                        - type: 'null'
                  title: Advanced text options
                  description: >-
                    Advanced options for controlling text extraction. Use this
                    when you need to limit text length or include HTML
                    structure.
            - type: 'null'
        highlights:
          anyOf:
            - description: >-
                Text snippets the LLM identifies as most relevant from each
                page.
              oneOf:
                - type: boolean
                  title: Simple highlights retrieval
                  description: >-
                    If true, returns highlights with default settings. If false,
                    disables highlights.
                  default: false
                - type: object
                  properties:
                    query:
                      anyOf:
                        - type: string
                          description: >-
                            Custom query that guides which highlights the LLM
                            picks.
                          example: Key advancements
                        - type: 'null'
                    maxCharacters:
                      anyOf:
                        - type: integer
                          minimum: 1
                          maximum: 10000
                          description: >-
                            Maximum number of characters to return for
                            highlights. Controls the total length of highlight
                            text returned per URL. Maximum supported value is
                            10000.
                          example: 2000
                        - type: 'null'
                    numSentences:
                      anyOf:
                        - type: integer
                          minimum: 1
                          description: >-
                            Deprecated and will be removed in a future release.
                            Currently mapped to a character budget of about 1333
                            characters per sentence. Pass highlights: true for
                            default highlights, or { query } to guide selection
                            with your own query.
                          example: 1
                          deprecated: true
                        - type: 'null'
                    highlightsPerUrl:
                      anyOf:
                        - type: integer
                          minimum: 1
                          description: >-
                            Deprecated and will be removed in a future release.
                            Currently ignored. Pass highlights: true for default
                            highlights, or { query } to guide selection with
                            your own query.
                          example: 1
                          deprecated: true
                        - type: 'null'
                  title: Advanced highlights options
                  description: >-
                    Advanced options for steering highlight extraction. Pass
                    highlights: true for the highest-quality default; supply
                    this object only when you need to guide selection with your
                    own query.
            - type: 'null'
        summary:
          anyOf:
            - type: object
              properties:
                query:
                  anyOf:
                    - type: string
                      description: Custom query for the LLM-generated summary.
                      example: Main developments
                    - type: 'null'
                schema:
                  anyOf:
                    - type: object
                      propertyNames:
                        type: string
                      additionalProperties:
                        $ref: '#/components/schemas/JsonValue'
                      description: >-
                        JSON schema for structured output from summary. See
                        https://json-schema.org/overview/what-is-jsonschema for
                        JSON Schema documentation.
                      example:
                        $schema: http://json-schema.org/draft-07/schema#
                        title: Title
                        type: object
                        properties:
                          Property 1:
                            type: string
                            description: Description
                          Property 2:
                            type: string
                            enum:
                              - option 1
                              - option 2
                              - option 3
                            description: Description
                        required:
                          - Property 1
                    - type: 'null'
              description: Summary of the webpage.
            - type: 'null'
        extras:
          anyOf:
            - type: object
              properties:
                links:
                  anyOf:
                    - type: integer
                      minimum: 0
                      maximum: 1000
                      description: Number of URLs to return from each webpage.
                      example: 1
                      default: 0
                    - type: 'null'
                imageLinks:
                  anyOf:
                    - type: integer
                      minimum: 0
                      maximum: 1000
                      description: Number of images to return for each result.
                      example: 1
                      default: 0
                    - type: 'null'
                richImageLinks:
                  anyOf:
                    - type: integer
                      minimum: 0
                      maximum: 1000
                      description: Number of rich image links to return for each result.
                      default: 0
                    - type: 'null'
                richLinks:
                  anyOf:
                    - type: integer
                      minimum: 0
                      maximum: 1000
                      description: Number of rich links to return for each result.
                      default: 0
                    - type: 'null'
                codeBlocks:
                  anyOf:
                    - type: integer
                      minimum: 0
                      maximum: 1000
                      description: Number of code blocks to return for each result.
                      default: 0
                    - type: 'null'
              description: Extra parameters to pass.
            - type: 'null'
        context:
          anyOf:
            - description: >-
                Deprecated: Use highlights or text instead. Returns page
                contents as a combined context string.
              deprecated: true
              oneOf:
                - type: boolean
                  description: >-
                    Deprecated: Use highlights or text instead. Returns page
                    contents as a combined context string.
                  example: true
                  deprecated: true
                - type: object
                  properties:
                    maxCharacters:
                      type: integer
                      minimum: 1
                      maximum: 10000
                      description: >-
                        Deprecated. Maximum character limit for the context
                        string. Maximum supported value is 10000.
                      example: 10000
                  description: >-
                    Deprecated: Use highlights or text instead. Returns page
                    contents as a combined context string.
                  deprecated: true
            - type: 'null'
        livecrawl:
          anyOf:
            - type: string
              enum:
                - never
                - always
                - fallback
                - preferred
              description: >-
                Deprecated: Use maxAgeHours instead for content freshness
                control. livecrawl does not guarantee freshly fetched parser
                output and may be served according to server freshness policy.
                Do not send livecrawl and maxAgeHours together.
              example: preferred
              deprecated: true
            - type: 'null'
        livecrawlTimeout:
          anyOf:
            - type: integer
              exclusiveMinimum: 0
              maximum: 90000
              description: The timeout for livecrawling in milliseconds.
              example: 1000
              default: 10000
            - type: 'null'
        maxAgeHours:
          anyOf:
            - type: integer
              minimum: -1
              maximum: 720
              description: >-
                Maximum age of cached content in hours. Positive values use
                cached content if it is less than this many hours old; 0 fetches
                fresh content and is the supported way to apply text rendering
                options to newly fetched pages; -1 always uses cache; omitted
                uses fallback fetching when cached content is unavailable.
                Maximum supported value is 720 hours.
              example: 24
            - type: 'null'
        subpages:
          anyOf:
            - type: integer
              minimum: 0
              maximum: 100
              description: >-
                The number of subpages to crawl. The actual number crawled may
                be limited by system constraints.
              example: 1
              default: 0
            - type: 'null'
        subpageTarget:
          anyOf:
            - description: >-
                Term to find specific subpages of search results. Can be a
                single string or an array of strings.
              example: sources
              oneOf:
                - type: string
                  minLength: 1
                  maxLength: 100
                - minItems: 0
                  maxItems: 100
                  type: array
                  items:
                    type: string
                    minLength: 1
                    maxLength: 100
            - type: 'null'
    ContentsRequest:
      allOf:
        - type: object
          properties:
            ids:
              minItems: 1
              maxItems: 100
              type: array
              items:
                type: string
                minLength: 1
                maxLength: 2048
              description: Array of document IDs obtained from searches.
              example:
                - https://arxiv.org/pdf/2307.06435
            urls:
              minItems: 1
              maxItems: 100
              type: array
              items:
                type: string
                minLength: 1
                maxLength: 2048
              description: >-
                Array of URLs to crawl (backwards compatible with 'ids'
                parameter).
              example:
                - https://arxiv.org/pdf/2307.06435
            compliance:
              anyOf:
                - type: string
                  enum:
                    - hipaa
                  description: >-
                    Enterprise-only compliance mode. Set to `hipaa` to require
                    HIPAA-safe processing. Requests fail closed or restrict
                    features when the requested behavior requires non-HIPAA-safe
                    processors.
                  example: hipaa
                - type: 'null'
          required:
            - urls
        - $ref: '#/components/schemas/ContentsOptions'
    AnswerRequest:
      type: object
      properties:
        query:
          type: string
          minLength: 1
          description: Natural-language question or instructions for the request.
          example: What is the latest valuation of SpaceX?
        stream:
          type: boolean
          description: >-
            If true, the response is returned as a server-sent events (SSE)
            stream.
          default: false
        text:
          type: boolean
          title: Simple text retrieval
          description: >-
            If true, returns full page text with default settings. If false,
            disables text return.
          default: false
        outputSchema:
          type: object
          properties:
            type:
              type: string
              description: The root schema type (typically "object").
              example: object
            properties:
              type: object
              propertyNames:
                type: string
              additionalProperties:
                $ref: '#/components/schemas/JsonValue'
              description: >-
                An object where each key is a property name and each value is a
                JSON Schema describing that property (with `type`,
                `description`, etc).
            required:
              type: array
              items:
                type: string
              description: List of required property names.
            description:
              type: string
              description: A description of the schema.
            additionalProperties:
              type: boolean
              description: Whether to allow properties not listed in `properties`.
              default: false
          additionalProperties:
            $ref: '#/components/schemas/JsonValue'
          description: >-
            A [JSON Schema Draft 7](https://json-schema.org/draft-07)
            specification for the desired answer structure. When provided, the
            answer is returned as a structured object matching the schema
            instead of a plain string.
      required:
        - query
    CreateSearchMonitorParameters:
      type: object
      properties:
        name:
          type: string
          description: An optional name for the monitor
        search:
          $ref: '#/components/schemas/SearchMonitorSearch'
        trigger:
          $ref: '#/components/schemas/SearchMonitorTrigger'
        outputSchema:
          $ref: '#/components/schemas/SearchMonitorOutputSchema'
        metadata:
          type: object
          propertyNames:
            type: string
          additionalProperties:
            type: string
          description: >-
            Optional key-value metadata. Echoed back in webhook deliveries so
            you can route updates to systems like Slack.
          example:
            slack_channel_id: C123ABC
            slack_thread_id: '1745444400.123456'
            user_id: U123ABC
        webhook:
          $ref: '#/components/schemas/SearchMonitorWebhook'
      required:
        - search
        - webhook
    SearchMonitorSearch:
      type: object
      properties:
        query:
          type: string
          minLength: 1
          description: The query string for the search.
          example: Latest developments in LLM capabilities
        numResults:
          type: integer
          minimum: 1
          maximum: 100
          description: >-
            Number of results to return. Limits vary by search type. The maximum
            public limit is 100 results. Contact sales (hello@exa.ai) to discuss
            higher limits.
          example: 10
          default: 10
        contents:
          $ref: '#/components/schemas/SearchMonitorContents'
      required:
        - query
    SearchMonitorContents:
      type: object
      properties:
        text:
          description: Text extraction options for each result.
          oneOf:
            - type: boolean
              title: Simple text retrieval
              description: >-
                If true, returns full page text with default settings. If false,
                disables text return.
              default: false
            - type: object
              properties:
                maxCharacters:
                  anyOf:
                    - type: integer
                      minimum: 1
                      maximum: 10000
                      description: >-
                        Maximum character limit for the full page text. Useful
                        for controlling response size and API costs. Maximum
                        supported value is 10000.
                      example: 1000
                    - type: 'null'
                includeHtmlTags:
                  anyOf:
                    - type: boolean
                      description: >-
                        If true, include lightweight HTML tags in returned text
                        instead of plain markdown-style text. Use maxAgeHours: 0
                        when you need this applied to freshly fetched content.
                      example: false
                      default: false
                    - type: 'null'
                verbosity:
                  anyOf:
                    - type: string
                      enum:
                        - compact
                        - standard
                        - full
                      description: >-
                        Controls text rendering verbosity. compact focuses on
                        main content, standard includes more surrounding page
                        context, and full requests the most complete rendered
                        text. Some pages may produce identical standard and full
                        output. Use maxAgeHours: 0 when you need this applied to
                        freshly fetched content.
                      example: standard
                      default: compact
                    - type: 'null'
                includeSections:
                  anyOf:
                    - type: array
                      items:
                        type: string
                        enum:
                          - header
                          - navigation
                          - banner
                          - body
                          - sidebar
                          - footer
                          - metadata
                      description: >-
                        Best-effort. Only include content classified into these
                        semantic page sections. Section classification may be
                        unavailable or incomplete for some pages; validate
                        output if strict filtering is required. Use maxAgeHours:
                        0 when you need this applied to freshly fetched content.
                      example:
                        - body
                        - header
                    - type: 'null'
                excludeSections:
                  anyOf:
                    - type: array
                      items:
                        type: string
                        enum:
                          - header
                          - navigation
                          - banner
                          - body
                          - sidebar
                          - footer
                          - metadata
                      description: >-
                        Exclude content classified into these semantic page
                        sections. Section classification is best-effort. Use
                        maxAgeHours: 0 when you need this applied to freshly
                        fetched content.
                      example:
                        - navigation
                        - footer
                        - sidebar
                    - type: 'null'
              title: Advanced text options
              description: >-
                Advanced options for controlling text extraction. Use this when
                you need to limit text length or include HTML structure.
        highlights:
          description: Text snippets the LLM identifies as most relevant from each page.
          oneOf:
            - type: boolean
              title: Simple highlights retrieval
              description: >-
                If true, returns highlights with default settings. If false,
                disables highlights.
              default: false
            - type: object
              properties:
                query:
                  anyOf:
                    - type: string
                      description: Custom query that guides which highlights the LLM picks.
                      example: Key advancements
                    - type: 'null'
                maxCharacters:
                  anyOf:
                    - type: integer
                      minimum: 1
                      maximum: 10000
                      description: >-
                        Maximum number of characters to return for highlights.
                        Controls the total length of highlight text returned per
                        URL. Maximum supported value is 10000.
                      example: 2000
                    - type: 'null'
                numSentences:
                  anyOf:
                    - type: integer
                      minimum: 1
                      description: >-
                        Deprecated and will be removed in a future release.
                        Currently mapped to a character budget of about 1333
                        characters per sentence. Pass highlights: true for
                        default highlights, or { query } to guide selection with
                        your own query.
                      example: 1
                      deprecated: true
                    - type: 'null'
                highlightsPerUrl:
                  anyOf:
                    - type: integer
                      minimum: 1
                      description: >-
                        Deprecated and will be removed in a future release.
                        Currently ignored. Pass highlights: true for default
                        highlights, or { query } to guide selection with your
                        own query.
                      example: 1
                      deprecated: true
                    - type: 'null'
              title: Advanced highlights options
              description: >-
                Advanced options for steering highlight extraction. Pass
                highlights: true for the highest-quality default; supply this
                object only when you need to guide selection with your own
                query.
        summary:
          description: >-
            Return an LLM-generated summary. Pass `true` for defaults, or an
            object with `query` and `maxTokens`.
          oneOf:
            - type: boolean
            - type: object
              properties:
                query:
                  anyOf:
                    - type: string
                      description: Custom query for the LLM-generated summary.
                      example: Main developments
                    - type: 'null'
                maxTokens:
                  type: integer
                  minimum: 1
                  description: Maximum tokens for the generated summary.
        extras:
          type: object
          properties:
            links:
              anyOf:
                - type: integer
                  minimum: 0
                  maximum: 1000
                  description: Number of URLs to return from each webpage.
                  example: 1
                  default: 0
                - type: 'null'
            imageLinks:
              anyOf:
                - type: integer
                  minimum: 0
                  maximum: 1000
                  description: Number of images to return for each result.
                  example: 1
                  default: 0
                - type: 'null'
            richImageLinks:
              anyOf:
                - type: integer
                  minimum: 0
                  maximum: 1000
                  description: Number of rich image links to return for each result.
                  default: 0
                - type: 'null'
            richLinks:
              anyOf:
                - type: integer
                  minimum: 0
                  maximum: 1000
                  description: Number of rich links to return for each result.
                  default: 0
                - type: 'null'
            codeBlocks:
              anyOf:
                - type: integer
                  minimum: 0
                  maximum: 1000
                  description: Number of code blocks to return for each result.
                  default: 0
                - type: 'null'
          description: Extra parameters to pass.
        context:
          description: >-
            Deprecated: Use highlights or text instead. Returns page contents as
            a combined context string.
          deprecated: true
          oneOf:
            - type: boolean
              description: >-
                Deprecated: Use highlights or text instead. Returns page
                contents as a combined context string.
              example: true
              deprecated: true
            - type: object
              properties:
                maxCharacters:
                  type: integer
                  minimum: 1
                  maximum: 10000
                  description: >-
                    Deprecated. Maximum character limit for the context string.
                    Maximum supported value is 10000.
                  example: 10000
              description: >-
                Deprecated: Use highlights or text instead. Returns page
                contents as a combined context string.
              deprecated: true
        livecrawl:
          description: Crawl strategy for fetching page content
          oneOf:
            - type: string
              enum:
                - never
                - always
                - fallback
                - preferred
            - type: string
              const: auto
        livecrawlTimeout:
          type: integer
          exclusiveMinimum: 0
          maximum: 90000
          description: The timeout for livecrawling in milliseconds.
          example: 1000
          default: 10000
        maxAgeHours:
          type: integer
          minimum: -1
          maximum: 720
          description: >-
            Maximum age of cached content in hours. Positive values use cached
            content if it is less than this many hours old; 0 fetches fresh
            content and is the supported way to apply text rendering options to
            newly fetched pages; -1 always uses cache; omitted uses fallback
            fetching when cached content is unavailable. Maximum supported value
            is 720 hours.
          example: 24
        filterEmptyResults:
          type: boolean
          description: Filter out results with no content
        subpages:
          type: integer
          minimum: 0
          maximum: 100
          description: >-
            The number of subpages to crawl. The actual number crawled may be
            limited by system constraints.
          example: 1
          default: 0
        subpageTarget:
          description: >-
            Term to find specific subpages of search results. Can be a single
            string or an array of strings.
          example: sources
          oneOf:
            - type: string
              minLength: 1
              maxLength: 100
            - minItems: 0
              maxItems: 100
              type: array
              items:
                type: string
                minLength: 1
                maxLength: 100
      description: >-
        Content extraction options applied to each search result. All fields are
        optional.
    SearchMonitorTrigger:
      type: object
      properties:
        type:
          type: string
          const: interval
          description: The type of trigger. Currently only `interval` is supported.
          default: interval
        period:
          type: string
          description: >-
            A duration string specifying how often the monitor runs (e.g., "1h",
            "6h", "1d", "7d"). Single-unit only. Minimum interval is 1 hour. The
            schedule is anchored to the monitor's creation time (e.g., a daily
            monitor created at 2:30 PM runs daily around 2:30 PM).
          example: 6h
      required:
        - type
        - period
    SearchMonitorOutputSchema:
      anyOf:
        - oneOf:
            - type: object
              properties:
                type:
                  type: string
                  const: text
                description:
                  type: string
              required:
                - type
            - type: object
              properties:
                type:
                  type: string
                  const: object
                description:
                  type: string
                properties:
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties:
                    $ref: '#/components/schemas/JsonValue'
                required:
                  type: array
                  items:
                    type: string
                additionalProperties:
                  type: boolean
              required:
                - type
              additionalProperties:
                $ref: '#/components/schemas/JsonValue'
          description: >-
            JSON schema for synthesized output. Supported root types are "text"
            and "object". When provided, the response includes an output object
            whose content matches this schema. Works with every search type and
            adds about 2 seconds of synthesis latency on top of the selected
            search type.
          type: object
        - type: 'null'
      description: >-
        Controls the format of the run output. Defaults to `{ "type": "text" }`
        if not specified. When `type` is `"text"`, the output is a plain text
        summary. When `type` is `"object"`, the output is structured JSON. If no
        `properties` are specified with `"object"` type, a schema is inferred
        automatically; otherwise the output adheres to the provided schema.
    SearchMonitorWebhook:
      type: object
      properties:
        url:
          type: string
          format: uri
          description: >-
            The HTTPS URL to receive webhook events. Must not point to localhost
            or private IP ranges.
        events:
          type: array
          items:
            type: string
            enum:
              - monitor.created
              - monitor.updated
              - monitor.deleted
              - monitor.run.created
              - monitor.run.completed
          description: >-
            Which events to subscribe to. Defaults to all events if not
            specified.
      required:
        - url
    BatchMonitorsRequest:
      type: object
      properties:
        action:
          type: string
          enum:
            - delete
            - pause
            - unpause
          description: >-
            The action to perform on matching monitors. `delete` permanently
            removes them, `pause` sets their status to paused, and `unpause`
            sets their status to active.
        filter:
          type: object
          properties:
            name:
              type: string
              maxLength: 250
              description: Filter by name (case-insensitive substring match)
            status:
              type: string
              enum:
                - active
                - paused
                - disabled
              description: Filter by monitor status
            metadata:
              type: object
              propertyNames:
                type: string
              additionalProperties:
                type: string
                maxLength: 1000
              description: Filter by metadata key-value pairs (exact match, AND semantics)
          description: >-
            At least one filter field must be provided to prevent accidental
            bulk operations.
        dry_run:
          type: boolean
          description: >-
            When `true`, returns the monitors that would be affected without
            performing the action. Defaults to `true`.
          default: true
        limit:
          type: integer
          minimum: 1
          maximum: 500
          description: >-
            Maximum number of monitors to process in a single request. Defaults
            to 50, maximum 500.
          default: 50
      required:
        - action
        - filter
    UpdateSearchMonitorParameters:
      type: object
      properties:
        name:
          anyOf:
            - type: string
            - type: 'null'
          description: Update the monitor name
        status:
          type: string
          enum:
            - active
            - paused
          description: Update the monitor status (can only set to `active` or `paused`)
        search:
          type: object
          properties:
            query:
              type: string
              minLength: 1
              description: The query string for the search.
              example: Latest developments in LLM capabilities
            numResults:
              type: integer
              minimum: 1
              maximum: 100
              description: >-
                Number of results to return. Limits vary by search type. The
                maximum public limit is 100 results. Contact sales
                (hello@exa.ai) to discuss higher limits.
              example: 10
              default: 10
            contents:
              $ref: '#/components/schemas/SearchMonitorContents'
          description: Partial search params to merge. All fields are optional for updates.
        trigger:
          anyOf:
            - type: object
              properties:
                type:
                  type: string
                  const: interval
                  description: The type of trigger. Currently only `interval` is supported.
                  default: interval
                period:
                  type: string
                  description: >-
                    A duration string specifying how often the monitor runs
                    (e.g., "1h", "6h", "1d", "7d"). Single-unit only. Minimum
                    interval is 1 hour.
            - type: 'null'
          description: Update the schedule. Set to null to remove the schedule.
        outputSchema:
          $ref: '#/components/schemas/SearchMonitorOutputSchema'
        metadata:
          anyOf:
            - type: object
              propertyNames:
                type: string
              additionalProperties:
                type: string
              description: Caller-provided key-value metadata for your own tracking.
              example:
                slack_channel_id: C123ABC
                slack_thread_id: '1745444400.123456'
                user_id: U123ABC
            - type: 'null'
          description: >-
            Update metadata. Set to null to remove. Echoed back in webhook
            deliveries so you can route updates to systems like Slack.
          example:
            slack_channel_id: C123ABC
            slack_thread_id: '1745444400.123456'
            user_id: U123ABC
        webhook:
          type: object
          properties:
            url:
              type: string
              format: uri
              description: >-
                The HTTPS URL to receive webhook events. Must not point to
                localhost or private IP ranges.
            events:
              type: array
              items:
                type: string
                enum:
                  - monitor.created
                  - monitor.updated
                  - monitor.deleted
                  - monitor.run.created
                  - monitor.run.completed
              description: >-
                Which events to subscribe to. Defaults to all events if not
                specified.
          description: >-
            Partial webhook params to merge. All fields are optional for
            updates.
    CreateAgentRunRequest:
      type: object
      properties:
        query:
          type: string
          minLength: 1
          description: Natural-language question or instructions for the request.
          example: >-
            What are the most important AI infrastructure funding rounds
            announced this week?
        systemPrompt:
          type: string
          description: >-
            Additional instructions that guide generated output or agent
            behavior. Use this for source preferences, novelty constraints,
            duplication constraints, or other behavior guidance.
          example: Prefer official sources and avoid duplicate results.
        input:
          type: object
          properties:
            data:
              type: array
              items:
                type: object
                propertyNames:
                  type: string
                additionalProperties:
                  $ref: '#/components/schemas/JsonValue'
                description: A JSON object record.
              description: Records the agent should process or enrich.
            exclusion:
              type: array
              items:
                type: object
                propertyNames:
                  type: string
                additionalProperties:
                  $ref: '#/components/schemas/JsonValue'
                description: A JSON object record.
              description: Records or entities the agent should avoid returning.
          description: >-
            Records to process and records or entities to exclude from the
            answer.
        outputSchema:
          anyOf:
            - type: object
              propertyNames:
                type: string
              additionalProperties:
                $ref: '#/components/schemas/JsonValue'
              description: >-
                JSON Schema for validated structured output in
                `output.structured`. Supports draft-07, 2019-09, and 2020-12 via
                `$schema`.
            - type: 'null'
        effort:
          $ref: '#/components/schemas/AgentEffort'
        previousRunId:
          description: Completed run ID to continue from. Must belong to the same team.
          $ref: '#/components/schemas/AgentRunId'
        metadata:
          type: object
          propertyNames:
            type: string
          additionalProperties:
            type: string
          description: Caller-provided metadata stored with the run.
          example:
            slack_channel_id: C123ABC
            slack_thread_id: '1745444400.123456'
            user_id: U123ABC
        budget:
          type: object
          properties:
            maxCostDollars:
              type: number
              minimum: 0
              description: Accepted for compatibility and currently ignored.
          description: Accepted for compatibility and currently ignored.
          deprecated: true
      required:
        - query
    AgentEffort:
      type: string
      enum:
        - low
        - medium
        - high
        - xhigh
        - auto
      description: >-
        Cost and reasoning effort preference for the run. `auto` lets Exa choose
        the appropriate effort.
      default: auto
    AgentRunId:
      type: string
      minLength: 1
      maxLength: 200
      pattern: ^[A-Za-z0-9_.:-]+$
      description: Agent run ID. New run IDs are returned with the `agent_run_` prefix.
      example: agent_run_01j7x9v0m2n4p6q8r0s2t4v6w8
    CostDollars:
      type: object
      properties:
        total:
          description: >-
            Estimated total dollar cost for the completed request. This response
            value is not an invoice record.
          example: 0.007
          format: float
          type: number
        search:
          description: >-
            Endpoint-dependent estimated search cost breakdown by retrieval
            mode. Instant, fast, and auto search responses may include neural
            search cost. Deep search modes may be reflected only in total.
          type: object
          properties:
            neural:
              description: Cost of neural search operations.
              example: 0.007
              format: float
              type: number
      description: >-
        Endpoint-dependent estimated dollar cost breakdown for the completed
        request. Billing is computed from usage counters rather than this
        response object.
    SearchResult:
      type: object
      properties:
        title:
          type: string
          description: The title of the search result.
          example: A Comprehensive Overview of Large Language Models
        url:
          type: string
          description: The URL of the search result.
          example: https://arxiv.org/pdf/2307.06435.pdf
          format: uri
        publishedDate:
          description: >-
            An estimate of the creation date, from parsing HTML content. Format
            is YYYY-MM-DD.
          example: 2023-11-16T01:36:32.547Z
          format: date-time
          type: string
        author:
          description: If available, the author of the content.
          example: Humza Naveed
          anyOf:
            - type: string
            - type: 'null'
        id:
          description: >-
            The temporary ID for the document. Useful for the /contents
            endpoint.
          example: https://arxiv.org/abs/2307.06435
          type: string
        image:
          description: The URL of an image associated with the search result, if available.
          example: https://arxiv.org/pdf/2307.06435.pdf/page_1.png
          format: uri
          type: string
        favicon:
          description: The URL of the favicon for the search result's domain.
          example: https://arxiv.org/favicon.ico
          format: uri
          type: string
        text:
          description: The full content text of the search result.
          example: >-
            Abstract Large Language Models (LLMs) have recently demonstrated
            remarkable capabilities...
          type: string
        highlights:
          description: Array of highlights extracted from the search result content.
          example:
            - Such requirements have limited their adoption...
          type: array
          items:
            type: string
        highlightScores:
          description: Array of cosine similarity scores for each highlighted snippet.
          example:
            - 0.4600165784358978
          type: array
          items:
            type: number
            format: float
        summary:
          description: Summary of the webpage.
          example: >-
            This overview paper on Large Language Models (LLMs) highlights key
            developments...
          type: string
        subpages:
          description: Array of subpages for the search result.
          type: array
          items:
            type: object
            properties:
              title:
                type: string
                description: The title of the search result.
                example: A Comprehensive Overview of Large Language Models
              url:
                type: string
                description: The URL of the search result.
                example: https://arxiv.org/pdf/2307.06435.pdf
                format: uri
              publishedDate:
                description: >-
                  An estimate of the creation date, from parsing HTML content.
                  Format is YYYY-MM-DD.
                example: 2023-11-16T01:36:32.547Z
                format: date-time
                type: string
              author:
                description: If available, the author of the content.
                example: Humza Naveed
                anyOf:
                  - type: string
                  - type: 'null'
              id:
                description: >-
                  The temporary ID for the document. Useful for the /contents
                  endpoint.
                example: https://arxiv.org/abs/2307.06435
                type: string
              image:
                description: >-
                  The URL of an image associated with the search result, if
                  available.
                example: https://arxiv.org/pdf/2307.06435.pdf/page_1.png
                format: uri
                type: string
              favicon:
                description: The URL of the favicon for the search result's domain.
                example: https://arxiv.org/favicon.ico
                format: uri
                type: string
            required:
              - title
              - url
        entities:
          description: >-
            Structured entity data for company or person search results. Only
            returned for category=company or category=people searches.
          type: array
          items:
            oneOf:
              - type: object
                properties:
                  id:
                    type: string
                    description: Stable company entity identifier.
                  type:
                    type: string
                    const: company
                    description: Entity discriminator.
                  version:
                    type: integer
                    minimum: 1
                    description: Entity schema version.
                  properties:
                    type: object
                    properties:
                      name:
