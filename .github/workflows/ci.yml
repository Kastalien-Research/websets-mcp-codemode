name: build

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # reads version from package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: 20 # matches the shipping runtime (Dockerfile node:20-alpine)
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm exec vitest run src/__tests__/startup.test.ts src/__tests__/config.test.ts
      # The full suite is not gated yet: pre-existing live integration tests,
      # Docker E2E tests, and type-format assertion failures need separate triage.
