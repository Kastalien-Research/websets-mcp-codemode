name: build

on:
  pull_request:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # reads version from package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: 20 # matches the shipping runtime (Dockerfile node:20-alpine)
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      # npm test is not gated yet: 2 pre-existing failures in
      # src/handlers/__tests__/integration/errors/type-format.test.ts
      # ("Common issues" hint assertions vs missing-count validation order)
      # need triage first. Add `npm test` here once those are resolved.
